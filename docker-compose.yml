services:
  app:
    build:
      context: .
      target: development
#    platform: linux/amd64
    env_file:
      - .env
    depends_on:
      - db
      - iipsrv
      - selenium
    environment: &app-environment
      LIT_LENDING_ROOT: spec/data/lending
      LIT_IIIF_BASE_URL: http://iipsrv.test/iiif/
    init: true
    networks:
      default:
        aliases:
          - app.test
    volumes:
      - .:/opt/app
      - ./app/assets/builds:/opt/app/app/assets/builds
    ports:
      - 3000:3000
    restart: always
    command: ./bin/dev

# Uncomment this to build and run a ucbears-collector container
#
#  ucbears-collector:
#    build:
#      context: .
#      target: development
#    environment:
#      LIT_LENDING_ROOT: /ucbears
#      LIT_LENDING_COLLECTOR_STOP_FILE: collector-dev.stop
#      VIPS_DISC_THRESHOLD: 1g
#    ports: []
#    command: bin/lending/collect.rb
#    restart: "no"
#    volumes:
#      - ./spec/data/lending:/ucbears

  db:
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: root
    image: postgres:12.2
    networks:
      default:
        aliases:
          - db.test
    restart: always
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./:/build:rw

  iipsrv:
    image: ghcr.io/berkeleylibrary/iipsrv:latest
    init: true
    environment:
      - VERBOSITY=6
      - LOGFILE=/dev/stdout
      - FILESYSTEM_PREFIX=/iipsrv-data/
      - CORS=*
    volumes:
      - ./iipsrv-data:/iipsrv-data:ro
    ports:
      - 80:80
    networks:
      default:
        aliases:
          - iipsrv.test

  selenium:
    image: selenium/standalone-chromium
    networks:
      default:
        aliases:
          - selenium.test
    ports:
      - 4444:4444
      - 7900:7900
    shm_size: 512mb
    volumes:
      - ./:/build:rw

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  postgres_data: { }
