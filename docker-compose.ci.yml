---

services:
  app:
    build: !reset
    environment:
      - CAPYBARA_SAVE_PATH=/opt/app/artifacts
    secrets:
      - SECRET_KEY_BASE
    env_file: !reset []
    image: ${DOCKER_APP_IMAGE}
    depends_on:
      - selenium
    volumes: !override
      - artifacts:/opt/app/artifacts
      - selenium_downloads:/opt/app/tmp/selenium_downloads
  
  db:
    volumes: !reset

  iipsrv: 

  selenium:
    volumes: !override
      - artifacts:/build

  adminer: !reset

secrets:
  SECRET_KEY_BASE:
    file: /tmp/secret_key_base

volumes:
  artifacts:
  selenium_downloads:
  iipsrv_data:
